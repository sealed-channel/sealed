name: sealed_app
description: 'A new Flutter project.'
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.1.3+13

environment:
  sdk: ^3.10.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^3.2.0
  bip39: ^1.0.6
  cryptography: ^2.9.0
  pinenacl: ^0.6.0
  sqflite: ^2.4.2
  sqflite_sqlcipher: ^3.1.0+1
  path: ^1.9.1
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.4
  argon2: ^1.0.1

  
  shared_preferences: ^2.5.4
  crypto: ^3.0.3
  dio: ^5.9.1
  flutter_svg: ^2.2.3
  gif: ^2.2.0


  intl: ^0.19.0
  string_similarity: ^2.1.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  connectivity_plus: ^6.1.0
  blockchain_utils: ^5.4.0
  post_quantum: ^1.0.0-prerelease.8
  messagepack: ^0.2.1

  # QR code rendering + camera scanning (qr-conversation-starter feature)
  qr_flutter: ^4.1.0
  qr_code_scanner_plus: ^2.0.10+1
  url_launcher: ^6.1.12
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  http: ^1.2.0
  sqflite_common_ffi: ^2.3.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
# Launcher Icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/app_icon.png'
  adaptive_icon_background: '#060606'
  adaptive_icon_foreground: 'assets/app_icon.png'

# Splash Screen
flutter_native_splash:
  color: '#060606'
  image: 'assets/splash_logo.png'
  android_12:
    color: '#060606'

    image: 'assets/splash_logo.png'
# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/dot-revolve.svg
    - assets/logo.png
    - assets/quantum-animation.gif
    - assets/icons/Check_All.svg
    - assets/icons/onboarding/end-to-end.svg
    - assets/icons/onboarding/hidden-ip.svg
    - assets/icons/onboarding/opensource.svg
    - assets/icons/onboarding/quantum.svg
    - assets/icons/Check.svg
    - assets/icons/Paper_Plane.svg
    - assets/icons/Copy.svg
    - assets/icons/login/encryption.png
    - assets/icons/login/anonymous.png
    - assets/icons/login/lightning.png
    - assets/icons/nav-bar/chats.svg
    - assets/icons/nav-bar/chats_filled.svg
    - assets/icons/nav-bar/contacts.svg
    - assets/icons/nav-bar/file.svg
    - assets/icons/nav-bar/settings.svg
    - assets/icons/login/idea.png
    - assets/icons/login/add_user.png
    - assets/icons/login/key.png
    - assets/sealed_bottom.png
    - assets/sealed_top.png
    - assets/icons/general/qr.svg
    - assets/icons/settings/Arrows_Reload_01.svg
    - assets/icons/settings/Bell.svg
    - assets/icons/settings/Copy.svg
    - assets/icons/settings/Credit_Card_01.svg
    - assets/icons/settings/Link.svg
    - assets/icons/settings/User_01.svg
    - assets/icons/settings/Mobile.svg
    - assets/icons/settings/algorand.svg
    - assets/algorand_full.svg
    - assets/face-id.svg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: DexaPro
      fonts:
        - asset: assets/fonts/DexaPro-100-Thin.otf
          weight: 100
        - asset: assets/fonts/DexaPro-100-Thin-Italic.otf
          weight: 100
          style: italic
        - asset: assets/fonts/DexaPro-200-ExtraLight.otf
          weight: 200
        - asset: assets/fonts/DexaPro-200-ExtraLight-Italic.otf
          weight: 200
          style: italic
        - asset: assets/fonts/DexaPro-300-Light.otf
          weight: 300
        - asset: assets/fonts/DexaPro-300-Light-Italic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/DexaPro-400-Regular.otf
          weight: 400
        - asset: assets/fonts/DexaPro-400-Regular-Italic.otf
          weight: 400
          style: italic
        - asset: assets/fonts/DexaPro-500-Medium.otf
          weight: 500
        - asset: assets/fonts/DexaPro-500-Medium-Italic.otf
          weight: 500
          style: italic
        - asset: assets/fonts/DexaPro-600-SemiBold.otf
          weight: 600
        - asset: assets/fonts/DexaPro-600-SemiBold-Italic.otf
          weight: 600
          style: italic
        - asset: assets/fonts/DexaPro-700-Bold.otf
          weight: 700
        - asset: assets/fonts/DexaPro-700-Bold-Italic.otf
          weight: 700
          style: italic
        - asset: assets/fonts/DexaPro-800-ExtraBold.otf
          weight: 800
        - asset: assets/fonts/DexaPro-800-ExtraBold-Italic.otf
          weight: 800
          style: italic
        - asset: assets/fonts/DexaPro-900-Black.otf
          weight: 900
        - asset: assets/fonts/DexaPro-900-Black-Italic.otf
          weight: 900
          style: italic
